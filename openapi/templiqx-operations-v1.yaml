          $ref: '#/components/schemas/QualityIdentifier'
        unit:
          $ref: '#/components/schemas/MetricUnit'
        aggregation:
          $ref: '#/components/schemas/MetricAggregation'
        direction:
          $ref: '#/components/schemas/ObjectiveDirection'
        claimed_measurement_profile_fingerprint:
          $ref: '#/components/schemas/QualityFingerprint'
        currency_code:
