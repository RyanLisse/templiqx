      type: string
      enum: [ratio_ppm, milliseconds, token_count, currency_microunits]
    MetricAggregation:
      type: string
      enum: [binary_ratio_ppm, mean, sum, p95_nearest_rank]
    ObjectiveDirection:
      type: string
      enum: [maximize, minimize]
    EligibilityComparator:
      type: string
      enum: [gte, lte]
    TokenKind:
      type: string
      enum: [prompt, completion, total]
    CandidateQualityFailureReason:
      type: string
      enum: [schema, assertion, invalid_output]
    InfrastructureFailureReason:
      type: string
      enum:
        - transport
        - timeout
        - rate_limit
        - provider_unavailable
        - provider_internal
        - cancellation
        - budget
        - evaluator_infrastructure
