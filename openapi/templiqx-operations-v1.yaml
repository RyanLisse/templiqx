      type: string
      minLength: 1
      maxLength: 128
      pattern: '^[A-Za-z0-9._:-]+$'
      description: Portable ASCII identifier, bounded to 128 UTF-8 bytes by Templiqx.
    QualityFingerprint:
      type: string
      minLength: 64
      maxLength: 64
      pattern: '^[A-Fa-f0-9]{64}$'
      description: Host-attested or Templiqx-computed SHA-256-compatible hexadecimal fingerprint.
