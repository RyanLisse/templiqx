openapi: 3.1.0
info:
  title: Templiqx Operations API
  version: 1.0.0-alpha.2
  summary: Versioned northbound HTTP contract for Templiqx operations.
  description: >-
    Representative v1 Operations API contract. The API is a thin transport over
    TempliqxService and returns OperationEnvelope responses. Hosts own auth,
    authorization, tenant policy, provider secrets, model routing, retries, and
    rate limiting. Templiqx owns diagnostics, fingerprints, path confinement,
    runtime capability checks, and CAS enforcement. WASM and the mock gateway are
    out of scope for production transport.
servers:
  - url: http://localhost:8080
    description: Local development transport
  - url: https://{host}
    description: Host-owned deployment
    variables:
      host:
        default: templiqx.example.invalid
tags:
  - name: Health
  - name: Discovery
  - name: Contracts
  - name: Execution
  - name: Quality
  - name: Mutation
paths:
  /operations/v1/health/live:
    get:
      tags: [Health]
      summary: Liveness probe
      operationId: getOperationsV1Liveness
      x-templiqx-idempotency: safe
      responses:
        '200':
          description: Transport process is alive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
  /operations/v1/health/ready:
    get:
      tags: [Health]
      summary: Readiness probe
      operationId: getOperationsV1Readiness
      x-templiqx-idempotency: safe
      responses:
        '200':
          description: Transport is ready to serve operations.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
        '503':
          description: Transport is alive but not ready.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
  /operations/v1/openapi.yaml:
    get:
      tags: [Discovery]
      summary: Return the checked-in OpenAPI document served by the transport (YAML)
      operationId: getOperationsV1OpenApiYaml
      x-templiqx-idempotency: safe
      responses:
        '200':
          description: OpenAPI 3.1 document.
          content:
            application/yaml:
              schema:
                type: string
  /operations/v1/openapi.json:
    get:
      tags: [Discovery]
      summary: Return the checked-in OpenAPI document served by the transport (JSON)
      operationId: getOperationsV1OpenApi
      x-templiqx-idempotency: safe
      responses:
        '200':
          description: OpenAPI 3.1 document.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /operations/v1/catalog:
    get:
      tags: [Discovery]
      summary: List canonical operation names
      operationId: catalog
      x-templiqx-idempotency: safe
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Operation catalog envelope.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogEnvelope'
  /operations/v1/packages:
    get:
      tags: [Discovery]
      summary: Discover package manifests
      operationId: discoverPackages
      x-templiqx-idempotency: safe
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Package discovery envelope.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PackageListEnvelope'
    post:
      tags: [Mutation]
      summary: Create a package
      operationId: createPackage
      x-templiqx-idempotency: create-once
      x-templiqx-idempotent: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePackageRequest'
      responses:
        '200':
          description: Created package envelope.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PackageEnvelope'
  /operations/v1/packages/{package}/contracts/{contract}:
    get:
      tags: [Contracts]
      summary: Inspect one contract
      operationId: inspectContract
      x-templiqx-idempotency: safe
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/PackageName'
        - $ref: '#/components/parameters/ContractId'
      responses:
        '200':
          description: Contract inspection envelope. Product failures are represented by ok=false diagnostics.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractEnvelope'
    put:
      tags: [Mutation]
      summary: Create or replace a contract from raw YAML source
      operationId: putContract
      x-templiqx-idempotency: cas-idempotent
      x-templiqx-idempotent: true
      parameters:
        - $ref: '#/components/parameters/PackageName'
        - $ref: '#/components/parameters/ContractId'
        - $ref: '#/components/parameters/OptionalIfMatch'
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
          application/yaml:
            schema:
              type: string
      responses:
        '200':
          description: Contract summary envelope.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SummaryEnvelope'
    delete:
      tags: [Mutation]
      summary: Delete a contract with CAS protection
      operationId: deleteContract
      x-templiqx-idempotency: cas-idempotent
      x-templiqx-idempotent: true
      parameters:
        - $ref: '#/components/parameters/PackageName'
        - $ref: '#/components/parameters/ContractId'
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '200':
          description: Deleted contract summary envelope.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SummaryEnvelope'
  /operations/v1/packages/{package}/contracts/{contract}/validate:
    post:
      tags: [Contracts]
      summary: Validate one contract
      operationId: validateContract
      x-templiqx-idempotency: idempotent
      x-templiqx-idempotent: true
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/PackageName'
        - $ref: '#/components/parameters/ContractId'
      responses:
        '200':
          description: Validation result envelope.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SummaryEnvelope'
  /operations/v1/packages/{package}/contracts/{contract}/compile:
    post:
      tags: [Contracts]
      summary: Compile one contract with inputs, context, and target capabilities
      operationId: compileContract
      x-templiqx-idempotency: idempotent
      x-templiqx-idempotent: true
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/PackageName'
        - $ref: '#/components/parameters/ContractId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompileRequest'
      responses:
        '200':
          description: Compiled interaction envelope.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompiledInteractionEnvelope'
  /operations/v1/packages/{package}/contracts/{contract}/execute:
    post:
      tags: [Execution]
      summary: Execute one contract through the configured RuntimeAdapter
      operationId: executeContract
      x-templiqx-idempotency: caller-defined
      x-templiqx-idempotent: false
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/PackageName'
        - $ref: '#/components/parameters/ContractId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecuteRequest'
      responses:
        '200':
          description: Execution receipt envelope. Runtime/schema failures use ok=false diagnostics inside the envelope.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionReceiptEnvelope'
        '408':
          $ref: '#/components/responses/TransportFailure'
        '413':
          $ref: '#/components/responses/TransportFailure'
  /operations/v1/packages/{package}:
    patch:
      tags: [Mutation]
      summary: Update package metadata with CAS protection
      operationId: updatePackage
      x-templiqx-idempotency: cas-idempotent
      x-templiqx-idempotent: true
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/PackageName'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePackageRequest'
      responses:
        '200':
          description: Updated package manifest envelope.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
            ETag:
              description: New package fingerprint.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PackageEnvelope'
        '409':
          $ref: '#/components/responses/TransportFailure'
    delete:
      tags: [Mutation]
      summary: Delete a package with CAS protection
      operationId: deletePackage
      x-templiqx-idempotency: cas-idempotent
      x-templiqx-idempotent: true
      parameters:
        - $ref: '#/components/parameters/PackageName'
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '200':
          description: Deleted package envelope.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PackageEnvelope'
  /operations/v1/packages/{package}/validate:
    post:
      tags: [Contracts]
      summary: Validate an entire package
      operationId: validatePackage
      x-templiqx-idempotency: idempotent
      x-templiqx-idempotent: true
      parameters:
        - $ref: '#/components/parameters/PackageName'
      responses:
        '200':
          $ref: '#/components/responses/OperationEnvelope'
  /operations/v1/packages/{package}/test:
    post:
      tags: [Execution]
      summary: Run all package eval fixtures
      operationId: testPackage
      x-templiqx-idempotency: caller-defined
      x-templiqx-idempotent: false
      parameters:
        - $ref: '#/components/parameters/PackageName'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CapabilitiesRequest'
      responses:
        '200':
          $ref: '#/components/responses/OperationEnvelope'
  /operations/v1/packages/{package}/identity:
    get:
      tags: [Discovery]
      summary: Export the canonical package identity
      operationId: exportPackageIdentity
      parameters:
        - $ref: '#/components/parameters/PackageName'
      responses:
        '200':
          $ref: '#/components/responses/OperationEnvelope'
  /operations/v1/packages/{package}/sign:
    post:
      tags: [Mutation]
      summary: Sign a package identity with CAS protection
      operationId: signPackage
      x-templiqx-idempotency: cas-idempotent
      x-templiqx-idempotent: true
      parameters:
        - $ref: '#/components/parameters/PackageName'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignPackageRequest'
      responses:
        '200':
          $ref: '#/components/responses/OperationEnvelope'
  /operations/v1/packages/{package}/verify-trust:
    post:
      tags: [Contracts]
      summary: Verify package signatures and trust policy
      operationId: verifyPackageTrust
      x-templiqx-idempotency: idempotent
      x-templiqx-idempotent: true
      parameters:
        - $ref: '#/components/parameters/PackageName'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyPackageTrustRequest'
      responses:
        '200':
          $ref: '#/components/responses/OperationEnvelope'
  /operations/v1/packages/{package}/evals:
    get:
      tags: [Execution]
      summary: List addressable eval fixtures
      operationId: listEvals
      parameters:
        - $ref: '#/components/parameters/PackageName'
      responses:
        '200':
          $ref: '#/components/responses/OperationEnvelope'
  /operations/v1/packages/{package}/evals/run:
    post:
      tags: [Execution]
      summary: Run one eval fixture
      operationId: runEval
      x-templiqx-idempotency: caller-defined
      x-templiqx-idempotent: false
      parameters:
        - $ref: '#/components/parameters/PackageName'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunEvalRequest'
      responses:
        '200':
          $ref: '#/components/responses/OperationEnvelope'
  /operations/v1/packages/{package}/quality/proposals:assess:
    post:
      tags: [Quality]
      summary: Assess host-evaluated contract proposals without mutation or winner selection
      description: >-
        Validates complete candidate contract sources and structurally validates
        host-attested evaluation evidence. Applies policy safety floors and
        returns deterministic fixed-point aggregates and Pareto fronts. The
        response never echoes candidate source or raw evaluator payloads.
      operationId: assessQualityProposals
      x-templiqx-idempotency: idempotent
      x-templiqx-idempotent: true
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/PackageName'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QualityProposalRequest'
      responses:
        '200':
          description: >-
            Proposal assessment envelope. Invalid proposals and failed safety
            floors are represented by deterministic diagnostics and eligibility
            results rather than transport-level errors.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QualityProposalReportEnvelope'
        '413':
          $ref: '#/components/responses/TransportFailure'
  /operations/v1/packages/{package}/contracts/{contract}/render:
    post:
      tags: [Contracts]
      summary: Render compiled contract messages
      operationId: renderContract
      x-templiqx-idempotency: idempotent
      x-templiqx-idempotent: true
      parameters:
        - $ref: '#/components/parameters/PackageName'
        - $ref: '#/components/parameters/ContractId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompileRequest'
      responses:
        '200':
          $ref: '#/components/responses/OperationEnvelope'
  /operations/v1/packages/{package}/contracts/{contract}/diff:
    post:
      tags: [Contracts]
      summary: Diff this contract against another contract
      operationId: diffContract
      x-templiqx-idempotency: idempotent
      x-templiqx-idempotent: true
      parameters:
        - $ref: '#/components/parameters/PackageName'
        - $ref: '#/components/parameters/ContractId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiffContractRequest'
      responses:
        '200':
          $ref: '#/components/responses/OperationEnvelope'
  /operations/v1/packages/{package}/contracts/{contract}/explain:
    get:
      tags: [Contracts]
      summary: Explain a contract's shape and references
      operationId: explainContract
      parameters:
        - $ref: '#/components/parameters/PackageName'
        - $ref: '#/components/parameters/ContractId'
      responses:
        '200':
          $ref: '#/components/responses/OperationEnvelope'
  /operations/v1/legacy/migrate:
    post:
      tags: [Mutation]
      summary: Migrate a package-confined legacy template
      operationId: migrateLegacy
      x-templiqx-idempotency: caller-defined
      x-templiqx-idempotent: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MigrateLegacyRequest'
      responses:
        '200':
          $ref: '#/components/responses/OperationEnvelope'
  /operations/v1/documents/render:
    post:
      tags: [Execution]
      summary: Render a document into a workspace artifact
      operationId: renderDocument
      x-templiqx-idempotency: caller-defined
      x-templiqx-idempotent: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenderDocumentRequest'
      responses:
        '200':
          $ref: '#/components/responses/OperationEnvelope'
  /operations/v1/documents/inspect:
    post:
      tags: [Execution]
      summary: Inspect a document template without mutation
      operationId: inspectDocument
      x-templiqx-idempotency: caller-defined
      x-templiqx-idempotent: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InspectDocumentRequest'
      responses:
        '200':
          $ref: '#/components/responses/InspectDocumentEnvelope'
  /operations/v1/artifacts:
    get:
      tags: [Discovery]
      summary: List workspace artifacts for a package
      operationId: listWorkspaceArtifacts
      parameters:
        - $ref: '#/components/parameters/PackageQuery'
        - $ref: '#/components/parameters/WorkspaceQuery'
        - $ref: '#/components/parameters/PrefixQuery'
      responses:
        '200':
          $ref: '#/components/responses/OperationEnvelope'
  /operations/v1/artifacts/{artifact}:
    get:
      tags: [Discovery]
      summary: Read a workspace artifact
      operationId: readArtifact
      parameters:
        - $ref: '#/components/parameters/ArtifactPath'
        - $ref: '#/components/parameters/PackageQuery'
        - $ref: '#/components/parameters/WorkspaceQuery'
      responses:
        '200':
          $ref: '#/components/responses/OperationEnvelope'
    delete:
      tags: [Mutation]
      summary: Delete a workspace artifact with CAS protection
      operationId: deleteWorkspaceArtifact
      x-templiqx-idempotency: cas-idempotent
      x-templiqx-idempotent: true
      parameters:
        - $ref: '#/components/parameters/ArtifactPath'
        - $ref: '#/components/parameters/PackageQuery'
        - $ref: '#/components/parameters/WorkspaceQuery'
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '200':
          $ref: '#/components/responses/OperationEnvelope'
components:
  parameters:
    RequestId:
      name: X-Request-Id
      in: header
      required: false
      description: Caller-provided correlation ID. The transport echoes or generates one.
      schema:
        type: string
        minLength: 1
        maxLength: 128
    TenantId:
      name: X-Tenant-Id
      in: header
      required: false
      description: Host-owned tenant correlation metadata. Templiqx does not authorize tenants.
      schema:
        type: string
        minLength: 1
        maxLength: 128
    PackageName:
      name: package
      in: path
      required: true
      schema:
        type: string
        pattern: '^[A-Za-z0-9_.-]+$'
    ContractId:
      name: contract
      in: path
      required: true
      schema:
        type: string
        pattern: '^[A-Za-z0-9_.-]+$'
    IfMatch:
      name: If-Match
      in: header
      required: true
      description: Current content fingerprint required for CAS mutation.
      schema:
        type: string
        pattern: '^sha256:[A-Fa-f0-9]+$|^[A-Fa-f0-9]{64}$'
    OptionalIfMatch:
      name: If-Match
      in: header
      required: false
      description: Current content fingerprint when replacing an existing contract.
      schema:
        type: string
    PackageQuery:
      name: package
      in: query
      required: true
      schema:
        type: string
    WorkspaceQuery:
      name: workspace
      in: query
      required: false
      schema:
        type: string
    PrefixQuery:
      name: prefix
      in: query
      required: false
      schema:
        type: string
    ArtifactPath:
      name: artifact
      in: path
      required: true
      description: Forward-slash-separated path relative to the package workspace.
      schema:
        type: string
  headers:
    RequestId:
      description: Effective correlation ID for logs and downstream diagnostics.
      schema:
        type: string
  responses:
    OperationEnvelope:
      description: Operation envelope. Product failures are represented by ok=false diagnostics.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/JsonValueEnvelope'
    InspectDocumentEnvelope:
      description: inspect_document operation envelope.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/InspectDocumentEnvelope'
    TransportFailure:
      description: Transport-level failure before a product OperationEnvelope can be returned.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/RequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TransportError'
  schemas:
    JsonValue:
      description: Arbitrary JSON value owned by Templiqx contract schemas or runtime output.
    HealthStatus:
      type: object
      required: [status, api_version]
      properties:
        status:
          type: string
          enum: [ok, ready, not_ready]
        api_version:
          type: string
        request_id:
          type: string
      additionalProperties: false
    TransportError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          examples: [TQX_TRANSPORT_TIMEOUT]
        message:
          type: string
        request_id:
          type: string
      additionalProperties: false
    OperationEnvelopeBase:
      type: object
      required: [api_version, operation, ok, diagnostics, fingerprints]
      properties:
        api_version:
          type: string
          const: templiqx/v1alpha1
        operation:
          type: string
        ok:
          type: boolean
        diagnostics:
          type: array
          items:
            $ref: '#/components/schemas/Diagnostic'
        fingerprints:
          type: object
          additionalProperties:
            type: string
        stream_events:
          type: array
          items:
            $ref: '#/components/schemas/StreamEvent'
      additionalProperties: true
    Diagnostic:
      type: object
      required: [code, severity, message]
      properties:
        code:
          type: string
        severity:
          type: string
          enum: [error, warning, info]
        message:
          type: string
        file:
          type: string
        json_pointer:
          type: string
        span:
          $ref: '#/components/schemas/SourceSpan'
        help:
          type: string
      additionalProperties: false
    SourceSpan:
      type: object
      required: [line, column, end_line, end_column]
      properties:
        line:
          type: integer
          minimum: 0
        column:
          type: integer
          minimum: 0
        end_line:
          type: integer
          minimum: 0
        end_column:
          type: integer
          minimum: 0
      additionalProperties: false
    CatalogEnvelope:
      allOf:
        - $ref: '#/components/schemas/OperationEnvelopeBase'
        - type: object
          properties:
            result:
              type: array
              items:
                type: string
    StringListEnvelope:
      allOf:
        - $ref: '#/components/schemas/OperationEnvelopeBase'
        - type: object
          properties:
            result:
              type: array
              items:
                type: string
    JsonValueEnvelope:
      allOf:
        - $ref: '#/components/schemas/OperationEnvelopeBase'
        - type: object
          properties:
            result:
              $ref: '#/components/schemas/JsonValue'
    PackageListEnvelope:
      allOf:
        - $ref: '#/components/schemas/OperationEnvelopeBase'
        - type: object
          properties:
            result:
              type: array
              items:
                $ref: '#/components/schemas/PackageManifest'
    PackageEnvelope:
      allOf:
        - $ref: '#/components/schemas/OperationEnvelopeBase'
        - type: object
          properties:
            result:
              $ref: '#/components/schemas/PackageManifest'
    ContractEnvelope:
      allOf:
        - $ref: '#/components/schemas/OperationEnvelopeBase'
        - type: object
          properties:
            result:
              $ref: '#/components/schemas/Contract'
    SummaryEnvelope:
      allOf:
        - $ref: '#/components/schemas/OperationEnvelopeBase'
        - type: object
          properties:
            result:
              $ref: '#/components/schemas/ContractSummary'
    CompiledInteractionEnvelope:
      allOf:
        - $ref: '#/components/schemas/OperationEnvelopeBase'
        - type: object
          properties:
            result:
              $ref: '#/components/schemas/CompiledInteraction'
    ExecutionReceiptEnvelope:
      allOf:
        - $ref: '#/components/schemas/OperationEnvelopeBase'
