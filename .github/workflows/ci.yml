name: ci

# Keep hosted CI intentionally small. Docker, kind, cold-image, and
# supply-chain checks are local-first (`just verify-all`).
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: extractions/setup-just@dd310ad5a97d8e7b41793f8ef055398d51ad4de6 # v2
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"
          cache: npm
      - name: Install local verification dependencies
        run: |
          command -v rg >/dev/null || (sudo apt-get update && sudo apt-get install -y ripgrep)
          curl -fsSL https://qlty.sh | bash
          echo "$HOME/.qlty/bin" >> "$GITHUB_PATH"
          npm ci
      - name: Run required code and documentation gates
        run: |
          just verify
          just docs-build
      - name: Run HTTP conformance certification gate
        run: just conformance-http
