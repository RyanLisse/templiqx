name: ci

on:
  push:
  pull_request:

# Runners are resource-constrained; helm-kind spins up a kind cluster plus full
# workspace builds. Overlapping runs on the same ref were stacking concurrent
# kind clusters/builds and exhausting the runner,
# which killed jobs mid-step with "runner has received a shutdown signal"
# rather than a normal test failure. Cancel superseded runs instead.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  boundaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - name: Validate script syntax
        run: bash -n scripts/check-boundaries.sh scripts/check-ci-gates.sh scripts/docker-smoke.sh scripts/fresh-clone-verify.sh scripts/kind-smoke.sh scripts/release-validate.sh scripts/release-verify-oci.sh scripts/supply-chain-smoke.sh
      - name: Validate release contract
        run: ./scripts/release-validate.sh 0.1.0
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Enforce architecture and deployment boundaries
        run: ./scripts/check-boundaries.sh
      - name: Enforce CI policy gates
        run: ./scripts/check-ci-gates.sh

  qlty:
    runs-on: ubuntu-latest
    needs: boundaries
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Install qlty
        run: |
          curl -fsSL https://qlty.sh | bash
          echo "$HOME/.qlty/bin" >> "$GITHUB_PATH"
      - run: qlty check --level=low

  rust:
    runs-on: ubuntu-latest
    needs: boundaries
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace --all-features
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Enforce CI policy gates
        run: ./scripts/check-ci-gates.sh
      - name: Assert exact retry-exhaustion failure semantics
        run: cargo test -p templiqx-conformance --test crm3_failures host_retry_exhaustion_uses_exact_terminal_code_and_no_payload

  docker:
    runs-on: ubuntu-latest
    needs: boundaries
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - run: ./scripts/docker-smoke.sh
      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        if: always()
        with:
          name: docker-smoke-receipts
          path: artifacts/docker-smoke/
          if-no-files-found: ignore

  helm-kind:
    runs-on: ubuntu-latest
    needs: boundaries
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
      - uses: helm/kind-action@a1b0e391336a6ee6713a0583f8c6240d70863de3 # v1.12.0
        with:
          cluster_name: templiqx-smoke
      - run: helm lint charts/templiqx -f charts/templiqx/values-mock.yaml
      - run: mkdir -p artifacts/helm-render
      - run: helm template templiqx charts/templiqx -f charts/templiqx/values-mock.yaml | tee artifacts/helm-render/templiqx.yaml
      - run: ./scripts/kind-smoke.sh
      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        if: always()
        with:
          name: helm-kind-receipts-render-logs
          path: |
            artifacts/helm-render/
            artifacts/kind-smoke/
          if-no-files-found: ignore

  supply-chain:
    runs-on: ubuntu-latest
    needs: boundaries
    env:
      IMAGE: templiqx:pre-crm3
      EXPECTED_PLATFORM: linux/amd64
      SYFT_VERSION: v1.20.0
      GRYPE_VERSION: v0.86.1
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      # The classic Docker Engine storage driver can't `--load` an image that
      # carries provenance/SBOM attestations (buildx has to emit a
      # multi-manifest index to hold them, and the docker exporter rejects
      # manifest lists). The containerd image store supports loading them
      # directly, so enable it before the build step below.
      - name: Enable containerd image store
        run: |
          echo '{"features":{"containerd-snapshotter":true}}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0
      - name: Install pinned Syft
        run: |
          set -euo pipefail
          version="${SYFT_VERSION#v}"
          curl -sSfL "https://github.com/anchore/syft/releases/download/${SYFT_VERSION}/syft_${version}_linux_amd64.tar.gz" -o /tmp/syft.tar.gz
          sudo tar -C /usr/local/bin -xzf /tmp/syft.tar.gz syft
          syft version
      - name: Install pinned Grype
        run: |
          set -euo pipefail
          version="${GRYPE_VERSION#v}"
          curl -sSfL "https://github.com/anchore/grype/releases/download/${GRYPE_VERSION}/grype_${version}_linux_amd64.tar.gz" -o /tmp/grype.tar.gz
          sudo tar -C /usr/local/bin -xzf /tmp/grype.tar.gz grype
          grype version
      - name: Fresh no-cache linux/amd64 image build with provenance
        run: |
          set -euo pipefail
          mkdir -p artifacts/supply-chain
          docker buildx build \
            --pull \
            --no-cache \
            --platform linux/amd64 \
            --progress=plain \
            --provenance=true \
            --sbom=true \
            --metadata-file=artifacts/supply-chain/build-metadata.json \
            --target templiqx-cli \
            -t "$IMAGE" \
            --load \
            . 2>&1 | tee artifacts/supply-chain/no-cache-linux-amd64-build.log
      - run: ./scripts/supply-chain-smoke.sh
      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        if: always()
        with:
          name: supply-chain-sbom-digest-logs
          path: artifacts/supply-chain/
          if-no-files-found: ignore
