name: docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "openwiki/**"
      - "blume.config.ts"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-${{ github.ref }}
  # Never cancel an in-flight Pages deployment; a later push can supersede it
  # safely, but cancelling during upload can leave the site mid-deploy.
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@56afc609e14207610c1b5a888f935638ae2793a # v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@d6db901512ade171098c1491475500b0551b2ed4 # v4
