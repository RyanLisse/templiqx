api_version: templiqx/v1alpha1
id: legal-document-drafting
version: 0.1.0
description: Draft a typed Dutch legal summary and merge_data from schema-valid extracted matter facts.
inputs:
  extracted_facts:
    schema:
      type: object
      additionalProperties: false
      required: [parties, claims, financials, evidence]
      properties:
        parties:
          type: array
          minItems: 2
          items:
            type: object
            additionalProperties: false
            required: [name, role]
            properties:
              name: { type: string }
              role: { type: string }
        claims:
          type: array
          minItems: 3
          items:
            type: object
            additionalProperties: false
            required: [id, description, amount_eur]
            properties:
              id: { type: string }
              description: { type: string }
              amount_eur: { type: number }
        financials:
          type: object
          additionalProperties: false
          required: [outstanding_total, currency]
          properties:
            outstanding_total: { type: number }
            currency: { type: string }
        evidence:
          type: array
          minItems: 6
          items:
            type: object
            additionalProperties: false
            required: [field, document_id, fragment_id, start_offset, end_offset, quote_sha256]
            properties:
              field: { type: string }
              document_id: { type: string }
              fragment_id: { type: string }
              start_offset: { type: integer, minimum: 0 }
              end_offset: { type: integer, minimum: 1 }
              quote_sha256: { type: string, minLength: 64, maxLength: 64 }
    required: true
    description: Output accepted from the legal-matter-extraction contract after schema validation.
context:
  client_name:
    schema: { type: string, minLength: 1 }
    required: true
    description: Synthetic client display name.
  matter_reference:
    schema: { type: string, minLength: 1 }
    required: true
    description: Host-owned opaque matter reference.
  department_name:
    schema: { type: string, minLength: 1 }
    required: true
    description: Synthetic department branding label for document headers.
capabilities: [structured_output]
messages:
  - role: system
    content:
      - kind: text
        value: "Maak een zakelijke Nederlandse conceptbrief. Gebruik alleen de gevalideerde feiten."
  - role: user
    content:
      - kind: text
        value: "Cliënt: "
      - kind: interpolate
        expression: { kind: ref, path: context.client_name }
        filters: [trim]
      - kind: text
        value: "\nZaak: "
      - kind: interpolate
        expression: { kind: ref, path: context.matter_reference }
        filters: [trim]
      - kind: text
        value: "\nAfdeling: "
      - kind: interpolate
        expression: { kind: ref, path: context.department_name }
        filters: [trim]
      - kind: text
        value: "\nGevalideerde feiten: "
      - kind: interpolate
        expression: { kind: ref, path: inputs.extracted_facts }
        filters: [json]
output_schema:
  type: object
  additionalProperties: false
  required: [title, summary, merge_data]
  properties:
    title: { type: string, minLength: 1 }
    summary: { type: string, minLength: 1 }
    merge_data:
      type: object
      additionalProperties: false
      required: [client, parties, claims, financials, department, optional_clauses, attachment_slot, signature_slot]
      properties:
        client:
          type: object
          additionalProperties: false
          required: [name]
          properties: { name: { type: string } }
        parties:
          type: array
          minItems: 2
          items:
            type: object
            additionalProperties: false
            required: [name, role]
            properties:
              name: { type: string }
              role: { type: string }
        claims:
          type: array
          minItems: 3
          items:
            type: object
            additionalProperties: false
            required: [id, description, amount_eur]
            properties:
              id: { type: string }
              description: { type: string }
              amount_eur: { type: number }
        financials:
          type: object
          additionalProperties: false
          required: [outstanding_total, currency, formatted_total]
          properties:
            outstanding_total: { type: number }
            currency: { type: string }
            formatted_total: { type: string }
        department:
          type: object
          additionalProperties: false
          required: [name, logo_slot]
          properties:
            name: { type: string }
            logo_slot: { type: string }
        optional_clauses:
          type: array
          minItems: 2
          items:
            type: object
            additionalProperties: false
            required: [id, text, included]
            properties:
              id: { type: string }
              text: { type: string }
              included: { type: boolean }
        attachment_slot:
          type: object
          additionalProperties: false
          required: [label, reference]
          properties:
            label: { type: string }
            reference: { type: string }
        signature_slot:
          type: object
          additionalProperties: false
          required: [role, placeholder]
          properties:
            role: { type: string }
            placeholder: { type: string }
runtime_policy:
  temperature: 0
extensions: {}
components: {}
