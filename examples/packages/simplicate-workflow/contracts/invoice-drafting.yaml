api_version: templiqx/v1alpha1
id: invoice-drafting
version: 0.1.0
description: Draft invoice lines, totals, and SMS notification text from schema-valid extracted project hours.
inputs:
  extracted_hours:
    schema:
      type: object
      additionalProperties: false
      required: [project, hours, rate_eur, evidence]
      properties:
        project:
          type: object
          additionalProperties: false
          required: [name, reference]
          properties:
            name: { type: string }
            reference: { type: string }
        hours:
          type: object
          additionalProperties: false
          required: [billable, period]
          properties:
            billable: { type: number }
            period: { type: string }
        rate_eur: { type: number }
        evidence:
          type: array
          minItems: 3
          items:
            type: object
            additionalProperties: false
            required: [field, document_id, fragment_id, start_offset, end_offset, quote_sha256]
            properties:
              field: { type: string }
              document_id: { type: string }
              fragment_id: { type: string }
              start_offset: { type: integer, minimum: 0 }
              end_offset: { type: integer, minimum: 1 }
              quote_sha256: { type: string, minLength: 64, maxLength: 64 }
    required: true
    description: Output accepted from the project-hours-extraction contract after schema validation.
context:
  customer_name:
    schema: { type: string, minLength: 1 }
    required: true
    description: Synthetic customer display name.
  invoice_reference:
    schema: { type: string, minLength: 1 }
    required: true
    description: Host-owned opaque invoice reference.
capabilities: [structured_output]
messages:
  - role: system
    content:
      - kind: text
        value: "Draft invoice lines, totals, and a concise SMS notification. Use only validated hours and rates."
  - role: user
    content:
      - kind: text
        value: "Customer: "
      - kind: interpolate
        expression: { kind: ref, path: context.customer_name }
        filters: [trim]
      - kind: text
        value: "\nInvoice reference: "
      - kind: interpolate
        expression: { kind: ref, path: context.invoice_reference }
        filters: [trim]
      - kind: text
        value: "\nValidated hours: "
      - kind: interpolate
        expression: { kind: ref, path: inputs.extracted_hours }
        filters: [json]
output_schema:
  type: object
  additionalProperties: false
  required: [title, summary, sms_text, merge_data]
  properties:
    title: { type: string, minLength: 1 }
    summary: { type: string, minLength: 1 }
    sms_text: { type: string, minLength: 1, maxLength: 160 }
    merge_data:
      type: object
      additionalProperties: false
      required: [customer, project, lines, totals]
      properties:
        customer:
          type: object
          additionalProperties: false
          required: [name]
          properties: { name: { type: string } }
        project:
          type: object
          additionalProperties: false
          required: [name, reference, period]
          properties:
            name: { type: string }
            reference: { type: string }
            period: { type: string }
        lines:
          type: array
          minItems: 1
          items:
            type: object
            additionalProperties: false
            required: [description, quantity, unit_price_eur, line_total_eur]
            properties:
              description: { type: string }
              quantity: { type: number }
              unit_price_eur: { type: number }
              line_total_eur: { type: number }
        totals:
          type: object
          additionalProperties: false
          required: [subtotal_eur, vat_eur, total_eur, currency]
          properties:
            subtotal_eur: { type: number }
            vat_eur: { type: number }
            total_eur: { type: number }
            currency: { type: string, enum: [EUR] }
runtime_policy:
  temperature: 0
extensions: {}
components: {}
provenance:
  domain: project-invoicing
  classification: synthetic
evals:
  - id: synthetic-invoice-draft
    inputs:
      extracted_hours:
        project:
          name: Website Redesign
          reference: SYN-PROJ-2201
        hours:
          billable: 32.5
          period: March 2026
        rate_eur: 125
        evidence:
          - { field: project.name, document_id: SYN-TIME-DOC-0001, fragment_id: timesheet-1, start_offset: 9, end_offset: 25, quote_sha256: aaaaaaaa11111111111111111111111111111111111111111111111111111111 }
          - { field: hours.billable, document_id: SYN-TIME-DOC-0001, fragment_id: timesheet-1, start_offset: 73, end_offset: 77, quote_sha256: bbbbbbbb22222222222222222222222222222222222222222222222222222222 }
          - { field: rate_eur, document_id: SYN-TIME-DOC-0001, fragment_id: timesheet-1, start_offset: 93, end_offset: 104, quote_sha256: cccccccc33333333333333333333333333333333333333333333333333333333 }
    context:
      customer_name: Demo Agency B.V.
      invoice_reference: SYN-INV-2026-0312
      _templiqx_authorized_merge:
        scope_id: SYN-PROJECT-SCOPE-001
        policy_decision_id: SYN-POLICY-DEC-003
        policy_version: "1.0.0"
        evidence_provenance_id: SYN-EVID-PROV-003
        issued_at: "2026-07-15T10:00:00Z"
