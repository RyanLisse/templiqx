image:
  repository: templiqx
  tag: pre-crm3
  # Published release charts set this to the verified OCI index digest. When
  # present, digest takes precedence over tag and renders repository@digest.
  digest: ""
  pullPolicy: IfNotPresent

httpServer:
  enabled: true
  replicaCount: 1
  image:
    repository: templiqx-http-server
    tag: pre-crm3
    digest: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  runtime:
    # LOCAL/DEMO only by default (not a signed release artifact).
    # deterministic-fake needs no credentials. Set mode to langfuse and
    # provide the non-secret endpoints plus a Secret reference below.
    # Mapped to TEMPLIQX_RUNTIME_MODE on the container.
    mode: deterministic-fake
    modelBaseUrl: ""
    modelId: ""
    modelTimeoutMs: 30000
    langfuseHost: ""
    credentialsSecret:
      name: ""
      modelApiKeyKey: MODEL_API_KEY
      langfusePublicKeyKey: LANGFUSE_PUBLIC_KEY
      langfuseSecretKeyKey: LANGFUSE_SECRET_KEY
  packages:
    existingClaim: ""
  workspace:
    existingClaim: ""

conformance:
  scenarios:
    - intake-document-01

mock:
  enabled: false
  gateway:
    enabled: false
    port: 8080

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi
