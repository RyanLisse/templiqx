image:
  repository: templiqx
  tag: pre-crm3
  # Published release charts set this to the verified OCI index digest. When
  # present, digest takes precedence over tag and renders repository@digest.
  digest: ""
  pullPolicy: IfNotPresent

conformance:
  scenarios:
    - intake-document-01

mock:
  enabled: false
  gateway:
    enabled: false
    port: 8080

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi
