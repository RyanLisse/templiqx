{{- if and .Values.mock.enabled .Values.mock.gateway.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "templiqx.fullname" . }}-mock-gateway
  labels:
    app.kubernetes.io/name: {{ include "templiqx.name" . }}
    app.kubernetes.io/component: mock-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "templiqx.name" . }}
      app.kubernetes.io/component: mock-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "templiqx.name" . }}
        app.kubernetes.io/component: mock-gateway
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mock-gateway
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/usr/local/bin/templiqx-mock-gateway"]
          args: ["--listen", "0.0.0.0:{{ .Values.mock.gateway.port }}", "--scenario-root", "/packages/crm3/scenarios"]
          ports:
            - name: health
              containerPort: {{ .Values.mock.gateway.port }}
          readinessProbe:
            httpGet:
              path: /health/ready
              port: health
          livenessProbe:
            httpGet:
              path: /health/live
              port: health
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "templiqx.fullname" . }}-mock-gateway
  labels:
    app.kubernetes.io/name: {{ include "templiqx.name" . }}
    app.kubernetes.io/component: mock-gateway
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "templiqx.name" . }}
    app.kubernetes.io/component: mock-gateway
  ports:
    - name: health
      port: {{ .Values.mock.gateway.port }}
      targetPort: health
{{- end }}
