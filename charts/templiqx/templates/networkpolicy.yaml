{{- if .Values.mock.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "templiqx.fullname" . }}-default-deny
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "templiqx.name" . }}
      ports:
        - protocol: TCP
          port: {{ .Values.mock.gateway.port }}
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "templiqx.name" . }}
      ports:
        - protocol: TCP
          port: {{ .Values.mock.gateway.port }}
{{- end }}
