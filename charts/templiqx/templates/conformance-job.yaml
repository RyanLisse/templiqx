apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "templiqx.fullname" . }}-conformance
  labels:
    app.kubernetes.io/name: {{ include "templiqx.name" . }}
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "templiqx.name" . }}
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: conformance
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/usr/local/bin/templiqx-http-conformance"]
          env:
            - name: TEMPLIQX_RUNTIME_URL
              value: "http://{{ include "templiqx.fullname" . }}-mock-gateway:{{ .Values.mock.gateway.port }}"
            - name: TEMPLIQX_RUNTIME_SCENARIO
              value: intake-document-01
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: workspace
              mountPath: /workspace
      volumes:
        - name: workspace
          emptyDir: {}
