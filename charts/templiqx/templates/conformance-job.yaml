{{- range .Values.conformance.scenarios }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "templiqx.fullname" $ }}-conformance-{{ . | replace "." "-" }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation
  labels:
    app.kubernetes.io/name: {{ include "templiqx.name" $ }}
    templiqx.conformance/scenario: {{ . | quote }}
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "templiqx.name" $ }}
        templiqx.conformance/scenario: {{ . | quote }}
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: conformance
          image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          command: ["/usr/local/bin/templiqx-http-conformance"]
          env:
            - name: TEMPLIQX_RUNTIME_URL
              value: "http://{{ include "templiqx.fullname" $ }}-mock-gateway:{{ $.Values.mock.gateway.port }}"
            - name: TEMPLIQX_RUNTIME_SCENARIO
              value: {{ . | quote }}
            - name: TEMPLIQX_HTTP_CONFORMANCE_MAX_ATTEMPTS
              value: "3"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml $.Values.resources | nindent 12 }}
          volumeMounts:
            - name: workspace
              mountPath: /workspace
      volumes:
        - name: workspace
          emptyDir: {}
{{- end }}
